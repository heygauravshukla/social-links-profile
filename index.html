<!DOCTYPE html>
<html lang="en" class="html">
  <head>
    <meta charset="UTF-8" />
    <!-- displays site properly based on user's device -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Social links profile</title>
    <meta
      name="description"
      content="This is a solution to the Social Links Profile challenge on Frontend Mentor."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="body">
    <main class="profile">
      <header class="profile__header">
        <figure class="profile__avatar">
          <img
            class="profile__avatar-image"
            src="./assets/images/avatar-jessica.jpeg"
            alt="Jessica's avatar"
            width="176"
            height="176"
          />
          <figcaption class="profile__info">
            <h1 class="profile__name">Jessica Randall</h1>
            <address class="profile__location">London, United Kingdom</address>
          </figcaption>
        </figure>
        <p class="profile__bio">"Front-end developer and avid reader."</p>
      </header>
      <nav class="profile__social-links">
        <ul class="profile__social-list">
          <li class="profile__social-item">
            <a class="profile__social-link" href="#">GitHub</a>
          </li>
          <li class="profile__social-item">
            <a class="profile__social-link" href="#">Frontend Mentor</a>
          </li>
          <li class="profile__social-item">
            <a class="profile__social-link" href="#">LinkedIn</a>
          </li>
          <li class="profile__social-item">
            <a class="profile__social-link" href="#">Twitter</a>
          </li>
          <li class="profile__social-item">
            <a class="profile__social-link" href="#">Instagram</a>
          </li>
        </ul>
      </nav>
    </main>

    <footer class="attribution">
      Challenge by
      <a
        class="attribution__link"
        href="https://www.frontendmentor.io?ref=challenge"
        target="_blank"
        >Frontend Mentor</a
      >. Coded by
      <a class="attribution__link" href="https://github.com/heygauravshukla"
        >Gaurav Shukla</a
      >.
    </footer>
  </body>
</html>
